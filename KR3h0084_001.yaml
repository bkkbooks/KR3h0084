canonical_identifier: bkk:krp/KR3h0084/chant/v1/juan/1
seq: 1
front:
  text: 鼎録并序昔虞夏之盛遠方皆至使九牧貢九金鑄九鼎於荊山之下于昆吾之墟白若甘攙之地圖其山川奇怪百物而為之備使人知神姦不逢其害以定其祥鼎成三足而方不炊而自沸不舉而自藏不遷而自行九鼎既成定之國都桀有亂德鼎遷于殷載祀六百殷紂暴虐鼎遷于周成王定鼎於郟鄩卜世三十卜年七百天所命也及顯王姬德大衰鼎淪入泗水秦始皇之初見於彭城大發徒出之不能得焉金華山皇帝作一鼎高一丈三尺大如十石甕像龍騰雲百神螭獸滿其中文曰真金作鼎百神率服復篆書三足漢孝景帝鑄一鼎名曰食鼎高二尺銅金銀雜為之形若尾甑無足中元六年造其文曰五熟是滋君王膳之小篆書武帝登泰山鑄一鼎高四尺銅銀為之其形如甕有三足太始四年造其文曰登于泰山萬壽無疆四海寧謐神鼎傳芳大篆書元鼎元年汾陽得寶鼎即吾丘壽王所識之鼎高一丈二尺受十二石雜金銀銅錫為之四面蛟龍兩耳能鳴三足馬蹄刻山雲奇怪之象紀靈圖未然之狀其文曰壽考天地百祥臻侍山伏其靈海伏其異此銘在底下又別有銘或浮或沉皆古文復篆此上古鑄造也總有九枚昭帝元平元年於藍田覆車山鑄一鼎高三尺受五斗刻其文曰宜君王和四方調滋味去腥傷小篆書三足廢帝賀以天鳳六年登位廢為海昏侯鑄一小鼎貯酒其形若甕四足受二斗其文曰長滿上小篆書宣帝甘露元年於華山仙掌鑄一鼎高五尺受四斗擬承甘露刻其文曰萬國伏貽長久鑄神鼎承天酒二足小篆書又建章宮銅人生毛以為美祥作一金鼎埋之本宮元帝初元二年鑄一鼎大如甕無足其文曰黃帝膳鼎小篆書成帝綏和元年胸奴平鑄一鼎其文曰寇盜平黃河清八分書三足高五尺六寸哀帝元壽元年鑄一鼎貯酒高四尺三足其文曰群臣元日用醴鼎小篆書平帝元始五年鑄一鼎受二斗其文曰藥鼎三足八分書王莽建國元年鑄一大鼎高一丈其文曰建國鼎莽自書埋之漸臺又作一鼎其文曰君臣之鼎並小篆書三足後漢光武建元元年鑄一鼎其文曰定天下萬物伏小篆書三足高九尺明帝永平十年鑄一鼎於洛水高六尺其文曰蛟龍伏大篆書三足又鑄一鼎於穀水高五尺其文曰穀洛小篆書四足章帝元和二年於北嶽鑄一鼎高四尺無足其文曰鎮池鼎小篆書安帝延光四年鑄一鼎於少室山其文曰承露鼎小篆書四足順帝永建六年鑄一鼎於伊水名曰魚鼎高四尺三足靈帝嘉平元年鑄一大鼎埋之鴻都門其文曰儒鼎古書三足漢官儀曰開陽門夜直樓上帝因作一鼎其文曰柱鼎一足如馬蹄蜀先主章武二年於漢川鑄一鼎名曰克漢鼎埋之丙穴中八分書三足又鑄一鼎沉於永安水中紀行軍奇變又於成都武簷山埋一鼎名曰受禪鼎又埋一鼎於劍口山名曰劍山鼎並小篆皆武侯迹又時龍見武陽之水九日因鑄一鼎像龍形沉水中蜀章武三年先王作二鼎一與魯王文曰富貴昌宜侯王一與梁王文曰大吉祥宜公王並古棣書高二尺魏武帝鑄一鼎於白鹿山高一丈紀征伐戰陳之能古文篆書四足更作鼎於太子名曰孝鼎畫刻古來孝子姓名小篆書文帝黃初元年鑄受禪鼎其文曰受祚鼎小篆書明帝太和六年鑄一鼎三足名曰萬壽鼎小篆書吳孫權黃武元年於彭蠡水沉一鼎其文曰百神助陽侯伏三足大篆書又獵於樊山見一姥問得何獸答曰得一豹曰何不截尾遂為姥立廟并作一鼎文曰豹尾鼎孫亮建興元年於武昌鑄一鼎其文曰鎮山鼎小篆書三足孫皓鑄一鼎於蔣山紀吳之曆數八分書晉懷帝永嘉六年鑄一鼎沉於瓜步江中無文字鼎似龜形宋王劉裕晉未初三年從秦中還紀功鑄一鼎於九江其文曰沸秦洛伏大漢古篆書宋文帝得蝦魚遂作一鼎其文曰蝦魚四足順帝升明元年有人於宮亭湖得一鼎上有古文洵漠二字齊高祖諱道成於齊中池內見龍聞簫鼓音遂埋一鼎其文曰龍鼎真書三足梁武帝大通元年於蔣山埋一鼎文曰大通真書又鑄一鼎書老子五千言沉之九江中並簫子雲書又天監二年安豐得一角靈龜武帝遂作一鼎投得龜處陳武帝即位鑄一鼎文曰元勳鼎沉于浙江陳宣帝於太極殿中鑄一鼎文曰忠烈常侍丁初正書太公於渭水得玉璜鑄一鼎刻其文曰璜鼎秦丞相樗里子作一鼎文曰智囊獨足古文大篆書荀況在嵩溪作一鼎大如五百甕表裏皆紀兵法大篆書四足張儀伐蜀鑄一鼎高三尺文曰定蜀大篆書李斯為丞相鑄一鼎其文曰上丞相鼎埋於上蔡東門蕭何為丞相鑄一鼎大如三石甕自表己功其文曰紀功鼎亦是何自作署書體四足張陵在雲臺山得仙作一鼎寫丹經埋於雲臺山下車千秋為丞相鑄一鼎文曰車丞相鼎八分書司馬遷字子長南遊探禹穴作一鼎而小記年月日埋之秦望山黃霸為潁川守神雀集遂刻鼎記之孔光拜丞相鑄一鼎文曰丞相博山侯大篆書王商為單于所畏遂令鑄一鼎刻記其功如勸功臣楊震為太尉作一鼎其文曰太尉鼎古隸書胡廣鑄一鼎其文曰孝子鼎八分書陳太丘鑄一鼎藏于陘山王允字子師郭林宗見而器之允鑄一鼎曰干里八分書王仲子為太司徒鑄一鼎其文曰司徒鼎大篆書王朗為司空鑄一鼎其文曰司空鼎復篆書董卓為太師鑄一鼎其文曰太師鼎古隸書蔡伯喈為侍中封高陽侯作一鼎記漢家曆數雍自書藏于泰山諸葛亮殺王雙還定軍山作一鼎埋於漢川其文曰定軍鼎又作八陳鼎沉之永安水中皆大篆書又於玄武郡金山作二鼎一大一小並無文時亮行軍見此山勢似有玉者故鎮之鍾繇魏文帝賜五熟鼎吳顧雍鑄一鼎文曰元凱之鼎八分書三足陸遜破劉備軍鑄一鼎紀功其文曰破備鼎孔愈獲龜放之遂作一鼎刻其文曰孔敬康鼎沉之於木張衡制地動圖記之於鼎沉于西鄂水中王羲之於九江作書鼎高五尺四面周匝書遍刻之沉於水中真隸書
